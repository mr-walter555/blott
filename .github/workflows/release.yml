name: Build release artifacts

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  create-release:
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create release with changelog and contributors
        uses: actions/github-script@v7
        with:
          script: |
            const { execSync } = require('child_process');

            let prevTag = '';
            try {
              prevTag = execSync('git describe --tags --abbrev=0 HEAD^', { encoding: 'utf8' }).trim();
            } catch (_) {}

            const range = prevTag ? `${prevTag}..HEAD` : 'HEAD';

            // Use unit-separator (\x1F) between fields and record-separator (\x1E)
            // between commits so subjects containing spaces/tabs parse cleanly.
            const raw = execSync(
              `git log --format="%H%x1F%h%x1F%s%x1E" ${range}`,
              { encoding: 'utf8' }
            ).trim();

            const records = raw
              ? raw.split('\x1e').map(r => r.trim()).filter(Boolean)
              : [];

            const seen = new Set();
            const avatars = [];
            const lines = [];

            for (const record of records) {
              const [sha, shortSha, subject] = record.split('\x1f');

              let username = '';
              try {
                const { data } = await github.rest.repos.getCommit({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  ref: sha.trim(),
                });
                if (data.author?.login) {
                  username = data.author.login;
                  if (!seen.has(username)) {
                    seen.add(username);
                    avatars.push(
                      `[<img src="${data.author.avatar_url}&s=64" width="64" title="@${username}">](${data.author.html_url})`
                    );
                  }
                }
              } catch (_) {}

              lines.push(`- ${subject.trim()} (${shortSha.trim()})${username ? ` @${username}` : ''}`);
            }

            const body = [
              '## What\'s Changed',
              '',
              lines.length ? lines.join('\n') : '_No commits since last tag_',
              '',
              '## Contributors',
              '',
              avatars.length ? avatars.join(' ') : '_No contributors found_',
            ].join('\n');

            const tag = context.ref.replace('refs/tags/', '');
            try {
              await github.rest.repos.createRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag_name: tag,
                name: tag,
                body,
                draft: false,
                prerelease: false
              });
            } catch (e) {
              if (e.status === 422) {
                const { data: existing } = await github.rest.repos.getReleaseByTag({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  tag,
                });
                await github.rest.repos.updateRelease({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  release_id: existing.id,
                  body,
                });
              } else {
                throw e;
              }
            }

  build:
    needs: create-release
    if: always() && (needs.create-release.result == 'success' || needs.create-release.result == 'skipped')
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Generate macOS icon
        if: runner.os == 'macOS'
        run: |
          mkdir -p assets/icon.iconset
          sips -z 16    16    assets/blott.png --out assets/icon.iconset/icon_16x16.png
          sips -z 32    32    assets/blott.png --out assets/icon.iconset/icon_16x16@2x.png
          sips -z 32    32    assets/blott.png --out assets/icon.iconset/icon_32x32.png
          sips -z 64    64    assets/blott.png --out assets/icon.iconset/icon_32x32@2x.png
          sips -z 128   128   assets/blott.png --out assets/icon.iconset/icon_128x128.png
          sips -z 256   256   assets/blott.png --out assets/icon.iconset/icon_128x128@2x.png
          sips -z 256   256   assets/blott.png --out assets/icon.iconset/icon_256x256.png
          sips -z 512   512   assets/blott.png --out assets/icon.iconset/icon_256x256@2x.png
          sips -z 512   512   assets/blott.png --out assets/icon.iconset/icon_512x512.png
          sips -z 1024  1024  assets/blott.png --out assets/icon.iconset/icon_512x512@2x.png
          iconutil -c icns assets/icon.iconset --output assets/icon.icns
          rm -rf assets/icon.iconset

      - name: Build and publish
        if: startsWith(github.ref, 'refs/tags/')
        run: npm run release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build only
        if: github.event_name == 'workflow_dispatch'
        run: npm run build
